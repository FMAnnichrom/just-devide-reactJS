<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Just Divide testing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;
    /**
     * @constant TILE_SETS
     * Defines the arithmetic configurations available at different difficulty tiers.
     */
    const TILE_SETS = {
      1: [2, 3, 4, 5, 6, 8, 9, 10, 12, 15, 16, 20, 24, 25, 32, 35],
      2: [3, 5, 6, 7, 9, 10, 11, 13, 14, 15, 21, 22, 26, 33, 39],
      3: [7, 11, 13, 14, 17, 19, 22, 23, 26, 29, 31, 34, 38, 46, 58, 62]
    };

    const getTileColors = (val) => {
      const defined = {
        2: { bg: '#ff94c2', text: '#c2185b' }, 3: { bg: '#64b5f6', text: '#0d47a1' },
        4: { bg: '#ffca28', text: '#ff6f00' }, 5: { bg: '#81c784', text: '#1b5e20' },
        6: { bg: '#ffca28', text: '#e65100' }, 8: { bg: '#ff9800', text: '#bf360c' },
        9: { bg: '#ce93d8', text: '#4a148c' }, 10: { bg: '#4db6ac', text: '#004d40' },
        12: { bg: '#2edd70', text: '#00600f' }, 15: { bg: '#f06292', text: '#880e4f' },
        16: { bg: '#e53935', text: 'white' }, 20: { bg: '#7986cb', text: '#1a237e' },
        24: { bg: '#aed581', text: '#33691e' }, 25: { bg: '#ba68c8', text: '#4a148c' },
        32: { bg: '#ff3b3b', text: 'white' }, 35: { bg: '#b026ff', text: 'white' }
      };
      if (defined[val]) return defined[val];
      const hue = (val * 137.5) % 360;
      return { bg: `hsl(${hue}, 65%, 55%)`, text: 'white' };
    };

    const generateTile = (diff = 1) => {
      const vals = TILE_SETS[diff];
      return vals[Math.floor(Math.random() * vals.length)];
    };

    const createEmptyGrid = () => Array.from({ length: 4 }, () => Array(4).fill(null));
    /**
     * @component App
     * Primary React component containing the encapsulated game state, drag logic.
     */
    function App() {
      const [uiScale, setUiScale] = useState(1);
      useEffect(() => {
        const updateScale = () => {
          if (window.innerWidth < 768) {
            // Mobile forces row layout. Scale to fit exactly ~460px base width side-by-side.
            const scaleW = window.innerWidth / 460;
            const scaleH = window.innerHeight / 800;
            setUiScale(Math.min(scaleW, scaleH, 1.0));
          } else {
            // Desktop scales relative to full horizontal view bounds.
            const scaleW = window.innerWidth / 1100;
            const scaleH = window.innerHeight / 850;
            setUiScale(Math.min(scaleW, scaleH, 1.3));
          }
        };
        window.addEventListener('resize', updateScale);
        updateScale();
        return () => window.removeEventListener('resize', updateScale);
      }, []);

      const [hasStarted, setHasStarted] = useState(false);
      const [confirmPrompt, setConfirmPrompt] = useState(null);
      const [difficulty, setDifficulty] = useState(1);
      const [grid, setGrid] = useState(createEmptyGrid());
      const [queue, setQueue] = useState([generateTile(1), generateTile(1), generateTile(1)]);
      const [keepVal, setKeepVal] = useState(null);

      const [score, setScore] = useState(0);
      const [bestScore, setBestScore] = useState(0);
      const [level, setLevel] = useState(1);
      const [trashCount, setTrashCount] = useState(10);

      const [timer, setTimer] = useState(0);
      const [gameOver, setGameOver] = useState(false);

      const [selectedItem, setSelectedItem] = useState(null);
      const [dragInfo, setDragInfo] = useState(null);

      const [animatingCells, setAnimatingCells] = useState([]);
      const [combos, setCombos] = useState([]);
      const [particles, setParticles] = useState([]);
      const [undoStack, setUndoStack] = useState([]);
      const [hintsEnabled, setHintsEnabled] = useState(false);
      const [trashAnim, setTrashAnim] = useState(false);

      useEffect(() => {
        const savedBest = localStorage.getItem('justDivideBest');
        if (savedBest) setBestScore(parseInt(savedBest, 10));
      }, []);

      useEffect(() => {
        if (score > bestScore) {
          setBestScore(score);
          localStorage.setItem('justDivideBest', score.toString());
        }
        const newLevel = Math.floor(score / 10) + 1;
        setLevel(newLevel);

        if (newLevel >= 10) setDifficulty(3);
        else if (newLevel >= 5) setDifficulty(2);
        else setDifficulty(1);
      }, [score, bestScore]);

      useEffect(() => {
        setTrashCount(10);
      }, [level]);

      useEffect(() => {
        if (gameOver || !hasStarted || confirmPrompt) return;
        const timerId = setInterval(() => setTimer(t => t + 1), 1000);
        return () => clearInterval(timerId);
      }, [gameOver, hasStarted, confirmPrompt]);

      const formatTime = (seconds) => {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
      };

      /**
       * @function saveState
       * Commits the current board configuration to the undo stack. Retains the previous 10 states.
       */
      const saveState = () => {
        setUndoStack(prev => {
          const newState = {
            grid: grid.map(r => [...r]), queue: [...queue], keepVal, score, trashCount, selectedItem
          };
          return [...prev.slice(-9), newState];
        });
      };

      const handleUndo = useCallback(() => {
        if (undoStack.length === 0 || gameOver || !hasStarted || confirmPrompt) return;
        const lastState = undoStack[undoStack.length - 1];
        setGrid(lastState.grid);
        setQueue(lastState.queue);
        setKeepVal(lastState.keepVal);
        setScore(lastState.score);
        setTrashCount(lastState.trashCount);
        setSelectedItem(lastState.selectedItem);
        setUndoStack(prev => prev.slice(0, -1));
      }, [undoStack, gameOver, hasStarted, confirmPrompt]);

      const resetGame = useCallback((newDiff = difficulty) => {
        setDifficulty(newDiff);
        setGrid(createEmptyGrid());
        setQueue([generateTile(newDiff), generateTile(newDiff), generateTile(newDiff)]);
        setKeepVal(null);
        setScore(0);
        setLevel(1);
        setTrashCount(10);
        setTimer(0);
        setGameOver(false);
        setSelectedItem(null);
        setUndoStack([]);
      }, [difficulty]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (['input', 'textarea'].includes(document.activeElement.tagName.toLowerCase())) return;
          const key = e.key.toLowerCase();

          if (!hasStarted) {
            if (key === '1') { resetGame(1); setHasStarted(true); }
            if (key === '2') { resetGame(2); setHasStarted(true); }
            if (key === '3') { resetGame(3); setHasStarted(true); }
            return;
          }

          if (key === '1') setConfirmPrompt({ type: 'DIFF', value: 1 });
          if (key === '2') setConfirmPrompt({ type: 'DIFF', value: 2 });
          if (key === '3') setConfirmPrompt({ type: 'DIFF', value: 3 });

          if (key === 'z') handleUndo();
          if (key === 'r') setConfirmPrompt({ type: 'BACK' });
          if (key === 'g') setHintsEnabled(prev => !prev);
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [handleUndo, resetGame, hasStarted]);

      const checkGameOver = (currentGrid) => {
        for (let r = 0; r < 4; r++) { for (let c = 0; c < 4; c++) { if (currentGrid[r][c] === null) return false; } }
        for (let r = 0; r < 4; r++) { for (let c = 0; c < 4; c++) { let val = currentGrid[r][c]; const neighbors = [[r + 1, c], [r, c + 1]]; for (let [nr, nc] of neighbors) { if (nr < 4 && nc < 4) { let nVal = currentGrid[nr][nc]; if (val === nVal) return false; if (val > nVal && val % nVal === 0) return false; if (nVal > val && nVal % val === 0) return false; } } } }
        return true;
      };

      const spawnParticles = (r, c) => {
        const newParticles = [];
        for (let i = 0; i < 8; i++) {
          const angle = (Math.PI * 2 * i) / 8;
          const mag = 30 + Math.random() * 30;
          newParticles.push({
            id: Date.now() + Math.random(),
            r, c,
            tx: Math.cos(angle) * mag + 'px',
            ty: Math.sin(angle) * mag + 'px',
            color: ['#ffca28', '#2edd70', '#64b5f6', '#ff94c2', '#fff'][Math.floor(Math.random() * 5)]
          });
        }
        setParticles(prev => [...prev, ...newParticles]);
        setTimeout(() => setParticles(prev => prev.filter(p => !newParticles.find(np => np.id === p.id))), 600);
      };

      /**
       * @function resolveMerges
       * Core game loop algorithm. Evaluates the board recursively for equal merges or valid arithmetic division pairs.
       */
      const resolveMerges = (currentGrid, startR, startC) => {
        let gridCopy = currentGrid.map(row => [...row]);
        let currentPoints = 0;
        let positionsToCheck = [{ r: startR, c: startC }];
        let mergesCount = 0;
        let animatedSet = new Set();
        let comboPos = { r: startR, c: startC };

        while (positionsToCheck.length > 0) {
          let { r, c } = positionsToCheck.shift();
          let val = gridCopy[r][c];
          if (val === null) continue;
          const neighbors = [[r - 1, c], [r + 1, c], [r, c - 1], [r, c + 1]];
          for (let [nr, nc] of neighbors) {
            if (nr >= 0 && nr < 4 && nc >= 0 && nc < 4 && gridCopy[nr][nc] !== null) {
              let nVal = gridCopy[nr][nc];
              if (val === nVal) {
                gridCopy[r][c] = null; gridCopy[nr][nc] = null; currentPoints += 3; mergesCount++; animatedSet.add(`${r},${c}`); animatedSet.add(`${nr},${nc}`); comboPos = { r: nr, c: nc }; break;
              } else if (val > nVal && val % nVal === 0) {
                let q = val / nVal;
                gridCopy[r][c] = q === 1 ? null : q;
                gridCopy[nr][nc] = null;
                currentPoints += 2;
                mergesCount++;
                animatedSet.add(`${r},${c}`);
                comboPos = { r, c };
                if (q !== 1) positionsToCheck.push({ r, c });
                break;
              } else if (nVal > val && nVal % val === 0) {
                let q = nVal / val;
                gridCopy[nr][nc] = q === 1 ? null : q;
                gridCopy[r][c] = null;
                currentPoints += 2;
                mergesCount++;
                animatedSet.add(`${nr},${nc}`);
                comboPos = { r: nr, c: nc };
                if (q !== 1) positionsToCheck.push({ r: nr, c: nc });
                break;
              }
            }
          }
        }
        return { newGrid: gridCopy, pointsEarned: currentPoints, mergesCount, animatedCells: Array.from(animatedSet), comboPos };
      };

      const processDropOnGrid = (payload, r, c) => {
        setHintsEnabled(false);
        saveState();
        let newGrid = grid.map(row => [...row]);
        newGrid[r][c] = payload.value;
        if (payload.source === 'ACTIVE') {
          setQueue([queue[1], queue[2], generateTile(difficulty)]);
        } else if (payload.source === 'KEEP') {
          setKeepVal(null);
        }
        const { newGrid: mergedGrid, pointsEarned, mergesCount, animatedCells, comboPos } = resolveMerges(newGrid, r, c);
        setGrid(mergedGrid);
        if (pointsEarned > 0) setScore(s => s + pointsEarned);
        if (mergesCount > 0) {
          setAnimatingCells(animatedCells);
          animatedCells.forEach(cell => {
            const [cr, cc] = cell.split(',').map(Number);
            spawnParticles(cr, cc);
          });
          setTimeout(() => setAnimatingCells([]), 400);
          if (mergesCount > 1) {
            const comboObj = { id: Date.now(), count: mergesCount, r: comboPos.r, c: comboPos.c };
            setCombos(prev => [...prev, comboObj]);
            setTimeout(() => setCombos(prev => prev.filter(c => c.id !== comboObj.id)), 2500);
          }
        }
        if (checkGameOver(mergedGrid)) setGameOver(true);
      };

      const processDropOnKeep = (payload) => {
        setHintsEnabled(false);
        saveState();
        if (payload.source === 'ACTIVE') {
          if (keepVal === null) {
            setKeepVal(queue[0]);
            setQueue([queue[1], queue[2], generateTile(difficulty)]);
          } else {
            const temp = keepVal;
            setKeepVal(queue[0]);
            setQueue([temp, queue[1], queue[2]]);
          }
        }
      };

      const processDropOnTrash = (payload) => {
        setHintsEnabled(false);
        saveState();
        setTrashAnim(true);
        setTimeout(() => setTrashAnim(false), 300);
        if (payload.source === 'ACTIVE') {
          setQueue([queue[1], queue[2], generateTile(difficulty)]);
          setTrashCount(tc => tc - 1);
        } else if (payload.source === 'KEEP') {
          setKeepVal(null);
          setTrashCount(tc => tc - 1);
        }
      };

      const handleGridClick = (r, c) => {
        if (!hasStarted || confirmPrompt) return;
        if (selectedItem && grid[r][c] === null && !gameOver) {
          processDropOnGrid(selectedItem, r, c);
          setSelectedItem(null);
        }
      };

      const handleKeepClick = () => {
        if (gameOver || !hasStarted || confirmPrompt) return;
        if (selectedItem) {
          processDropOnKeep(selectedItem);
          setSelectedItem(null);
        } else if (keepVal !== null) {
          setSelectedItem({ source: 'KEEP', value: keepVal });
        }
      };

      const handleTrashClick = () => {
        if (!hasStarted || confirmPrompt) return;
        if (selectedItem && trashCount > 0 && !gameOver) {
          processDropOnTrash(selectedItem);
          setSelectedItem(null);
        }
      };

      const handleActiveClick = () => {
        if (gameOver || !hasStarted || confirmPrompt) return;
        if (selectedItem?.source === 'ACTIVE') {
          setSelectedItem(null);
        } else {
          setSelectedItem({ source: 'ACTIVE', value: queue[0] });
        }
      };

      /**
       * @function handlePointerDown
       * Native DOM pointer interceptor to initiate cross-container drag sequences across the UI.
       */
      const handlePointerDown = (e, source, value) => {
        if (gameOver || !hasStarted || confirmPrompt) return;
        try { e.target.setPointerCapture(e.pointerId); } catch (ex) { }
        const rect = e.currentTarget.getBoundingClientRect();
        setDragInfo({
          item: { source, value },
          startX: e.clientX, startY: e.clientY,
          currentX: e.clientX, currentY: e.clientY,
          snapX: null, snapY: null,
          originRect: rect,
          status: 'DRAGGING'
        });
      };

      const handleGlobalPointerMove = (e) => {
        if (!dragInfo || dragInfo.status !== 'DRAGGING' || !hasStarted || confirmPrompt) return;
        const ghost = document.getElementById('drag-ghost');
        if (ghost) ghost.style.display = 'none';
        const hoverEl = document.elementFromPoint(e.clientX, e.clientY);
        if (ghost) ghost.style.display = 'block';
        const gridCell = hoverEl?.closest('[data-grid-r]');
        const keepCell = hoverEl?.closest('[data-keep]');
        const trashCell = hoverEl?.closest('[data-trash]');
        let snapX = null;
        let snapY = null;
        if (gridCell) {
          const rect = gridCell.getBoundingClientRect();
          snapX = rect.left + rect.width / 2;
          snapY = rect.top + rect.height / 2;
        } else if (keepCell) {
          const rect = keepCell.getBoundingClientRect();
          snapX = rect.left + rect.width / 2;
          snapY = rect.top + rect.height / 2;
        } else if (trashCell) {
          const rect = trashCell.getBoundingClientRect();
          snapX = rect.left + rect.width / 2;
          snapY = rect.top + rect.height / 2;
        }
        setDragInfo(prev => ({ ...prev, currentX: e.clientX, currentY: e.clientY, snapX, snapY }));
      };

      const handleGlobalPointerUp = (e) => {
        try { e.target.releasePointerCapture(e.pointerId); } catch (ex) { }
        if (!dragInfo || dragInfo.status !== 'DRAGGING' || !hasStarted || confirmPrompt) return;
        const dist = Math.hypot(e.clientX - dragInfo.startX, e.clientY - dragInfo.startY);
        if (dist < 10) {
          if (dragInfo.item.source === 'ACTIVE') handleActiveClick(); else if (dragInfo.item.source === 'KEEP') handleKeepClick();
          setDragInfo(null); return;
        }
        const ghost = document.getElementById('drag-ghost'); if (ghost) ghost.style.display = 'none';
        const hoverEl = document.elementFromPoint(e.clientX, e.clientY); if (ghost) ghost.style.display = 'block';
        const gridCell = hoverEl?.closest('[data-grid-r]'); const keepCell = hoverEl?.closest('[data-keep]'); const trashCell = hoverEl?.closest('[data-trash]');
        let validDrop = false;
        if (gridCell) {
          const r = parseInt(gridCell.getAttribute('data-grid-r')); const c = parseInt(gridCell.getAttribute('data-grid-c'));
          if (grid[r][c] === null) { processDropOnGrid(dragInfo.item, r, c); validDrop = true; }
        } else if (keepCell) {
          processDropOnKeep(dragInfo.item); validDrop = true;
        } else if (trashCell && trashCount > 0) {
          processDropOnTrash(dragInfo.item); validDrop = true;
        }
        if (validDrop) { setDragInfo(null); setSelectedItem(null); } else { setDragInfo(prev => ({ ...prev, status: 'SNAPPING_BACK' })); setTimeout(() => setDragInfo(null), 200); }
      };

      const Tile = ({ value, onPointerDown, isDraggable, extraClasses = '', isSelected = false }) => {
        if (value === null) return <div className={`w-[60px] h-[60px] rounded-xl ${extraClasses}`} />;
        const colors = getTileColors(value);
        const isWhiteText = colors.text === 'white';
        return (
          <div onPointerDown={(e) => { if (isDraggable && onPointerDown) onPointerDown(e, value); }}
            className={`w-[60px] h-[60px] relative overflow-hidden flex items-center justify-center rounded-xl font-black text-[28px] shadow-[0_2px_4px_rgba(0,0,0,0.3)] select-none transition-transform ${isSelected ? 'ring-4 ring-white/80 scale-110 z-10' : ''} ${isDraggable && !gameOver && hasStarted && !confirmPrompt ? 'cursor-grab active:cursor-grabbing hover:scale-105 touch-none' : 'cursor-default'} ${extraClasses}`}
            style={{ backgroundColor: colors.bg, color: colors.text, borderTop: '4px solid rgba(255,255,255,0.4)', borderBottom: '4px solid rgba(0,0,0,0.15)', borderLeft: '2px solid rgba(255,255,255,0.2)', borderRight: '2px solid rgba(0,0,0,0.1)' }}
          >
            <div className="absolute inset-0 top-0 h-[45%] bg-gradient-to-b from-white/40 to-transparent pointer-events-none rounded-t-xl" />
            <span className="relative z-10" style={{ textShadow: isWhiteText ? '1px 1px 2px rgba(0,0,0,0.4)' : 'none' }}>{value}</span>
          </div>
        );
      };

      const isSnapped = dragInfo?.snapX !== null && dragInfo?.snapX !== undefined;
      const isSnappingBack = dragInfo?.status === 'SNAPPING_BACK';
      let ghostX = 0, ghostY = 0, ghostScale = 1;
      if (dragInfo) {
        ghostX = isSnappingBack ? dragInfo.originRect.left + dragInfo.originRect.width / 2 : (isSnapped ? dragInfo.snapX : dragInfo.currentX);
        ghostY = isSnappingBack ? dragInfo.originRect.top + dragInfo.originRect.height / 2 : (isSnapped ? dragInfo.snapY : dragInfo.currentY);
        ghostScale = isSnappingBack ? uiScale : (isSnapped ? 1.05 * uiScale : 1.15 * uiScale);
      }

      return (
        <div className="min-h-screen w-full bg-[#ffe5df] font-sans flex flex-col items-center py-6 relative overflow-hidden touch-none select-none" onPointerMove={handleGlobalPointerMove} onPointerUp={handleGlobalPointerUp} onPointerLeave={handleGlobalPointerUp} onPointerCancel={handleGlobalPointerUp}>
          <style>{` 
             @keyframes combineGlow { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.2); filter: brightness(1.4); box-shadow: 0 0 20px rgba(255, 255, 255, 1); z-index: 20; } 100% { transform: scale(1); filter: brightness(1); box-shadow: 0 0 0 rgba(255, 255, 255, 0); } } 
             .anim-combine { animation: combineGlow 0.4s ease-out forwards; } 
             @keyframes floatCombo { 0% { opacity: 0; transform: translate(-50%, 0) scale(0.5); } 15% { opacity: 1; transform: translate(-50%, -20px) scale(1.3) rotate(-5deg); } 85% { opacity: 1; transform: translate(-50%, -40px) scale(1) rotate(0deg); } 100% { opacity: 0; transform: translate(-50%, -50px) scale(0.9); } } 
             .anim-combo { animation: floatCombo 2.5s ease-out forwards; } 
             @keyframes particlePop { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; } }
             .anim-particle { animation: particlePop 0.6s ease-out forwards; }
             @keyframes trashPopAnim { 0% { transform: scale(1); } 50% { transform: scale(1.3) rotate(5deg); } 100% { transform: scale(1); } }
             .anim-trash-pop { animation: trashPopAnim 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
          `}</style>

          {/* Aesthetic Background Bubbles */}
          <div className="absolute inset-0 z-0 pointer-events-none overflow-hidden">
            <div className="absolute w-[180px] h-[180px] rounded-full bg-[#ffa48f] opacity-50 -top-[50px] -left-[40px]" />
            <div className="absolute w-[280px] h-[280px] rounded-full bg-[#ffa48f] opacity-40 top-[60%] -left-[80px]" />
            <div className="absolute w-[60px] h-[60px] rounded-full bg-[#ffa48f] opacity-60 top-[25%] left-[8%]" />
            <div className="absolute w-[40px] h-[40px] rounded-full bg-[#ffa48f] opacity-40 top-[70%] left-[25%]" />
            <div className="absolute w-[220px] h-[220px] rounded-full bg-[#ffa48f] opacity-50 -bottom-[60px] right-[10%]" />
            <div className="absolute w-[130px] h-[130px] rounded-full bg-[#ffa48f] opacity-50 top-[15%] -right-[30px]" />
            <div className="absolute w-[80px] h-[80px] rounded-full bg-[#ffa48f] opacity-60 top-[55%] right-[8%]" />
            <div className="absolute w-[30px] h-[30px] rounded-full bg-[#ffa48f] opacity-70 top-[35%] right-[22%]" />
            <div className="absolute w-[45px] h-[45px] rounded-full bg-[#ffa48f] opacity-50 top-[8%] left-[18%]" />
          </div>

          {dragInfo && (
            <div id="drag-ghost" className="fixed z-[100] pointer-events-none origin-center" style={{ left: 0, top: 0, transform: `translate(${ghostX - 30}px, ${ghostY - 30}px) scale(${ghostScale})`, transition: isSnappingBack || isSnapped ? 'transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1)' : 'none' }}>
              <Tile value={dragInfo.item.value} isDraggable={false} extraClasses="shadow-2xl" />
            </div>
          )}

          <div className="flex flex-col items-center w-full origin-top transition-transform duration-200 z-10" style={{ transform: `scale(${uiScale})` }}>
            <div className="w-full max-w-4xl px-8 flex justify-between items-center z-10 mb-4">
              <button onClick={() => hasStarted ? setConfirmPrompt({ type: 'BACK' }) : null} className="w-12 h-12 bg-[#8c52ff] border-2 border-white text-white rounded-full font-bold flex items-center justify-center shadow-md hover:scale-105 transition-transform" title="Back to Menu">
                {hasStarted ? (
                  <svg className="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" /></svg>
                ) : (
                  <svg className="w-5 h-5 fill-current opacity-50" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" /></svg>
                )}
              </button>
              <div className="flex flex-col items-center">
                <h1 className="text-[32px] font-black text-[#4a3525] tracking-widest uppercase" style={{ WebkitTextStroke: '1px white' }}>JUST DIVIDE</h1>
                <div className="flex items-center gap-2 font-bold text-[#4a3525] text-xl mt-1">
                  <span className="w-16 text-center">{formatTime(timer)}</span>
                </div>
              </div>
              <button onClick={() => setHintsEnabled(!hintsEnabled)} className={`w-12 h-12 border-2 border-white text-white rounded-full font-bold text-xl flex items-center justify-center shadow-md hover:scale-105 transition-all duration-300 ${hintsEnabled ? 'bg-yellow-400 shadow-[0_0_15px_rgba(250,204,21,0.8)]' : 'bg-[#00c853]'}`}>
                {hintsEnabled ? '💡' : '?'}
              </button>
            </div>

            <p className="font-black tracking-wide uppercase text-lg mb-10 z-10 text-center px-4" style={{ color: '#ff6b6b', textShadow: '2px 2px 0px white, -2px -2px 0px white, 2px -2px 0px white, -2px 2px 0px white' }}>
              Divide with the numbers to solve the rows and columns.
            </p>

            <div className="flex flex-row gap-4 sm:gap-12 md:gap-16 items-center z-10 mt-6 relative w-full max-w-3xl justify-center">
              {!hasStarted && (
                <div className="absolute inset-0 z-50 flex flex-col items-center justify-center bg-[#ffe5dfe6] backdrop-blur-md rounded-2xl p-8 shadow-2xl pb-16 transform translate-y-12">
                  <h2 className="text-4xl font-black mb-12 text-[#cc2e2e] drop-shadow-md tracking-wider text-center" style={{ textShadow: '2px 2px 0 white, -2px -2px 0 white, 2px -2px 0 white, -2px 2px 0 white' }}>
                    CHOOSE DIFFICULTY
                  </h2>
                  <div className="flex gap-6">
                    <button onClick={() => { resetGame(1); setHasStarted(true); }} className="bg-[#4db6ac] hover:bg-[#26a69a] text-white font-black px-6 py-8 rounded-xl shadow-[0_6px_0_#00695c] border-[4px] border-white text-xl transform transition hover:scale-105 active:translate-y-2 active:shadow-none w-32 flex flex-col items-center gap-2">
                      <span className="text-3xl">😊</span>
                      <span>EASY</span>
                    </button>
                    <button onClick={() => { resetGame(2); setHasStarted(true); }} className="bg-[#ffca28] hover:bg-[#ffb300] text-white font-black px-6 py-8 rounded-xl shadow-[0_6px_0_#ff6f00] border-[4px] border-white text-xl transform transition hover:scale-105 active:translate-y-2 active:shadow-none w-32 flex flex-col items-center gap-2">
                      <span className="text-3xl">😐</span>
                      <span>MED</span>
                    </button>
                    <button onClick={() => { resetGame(3); setHasStarted(true); }} className="bg-[#e53935] hover:bg-[#d32f2f] text-white font-black px-6 py-8 rounded-xl shadow-[0_6px_0_#b71c1c] border-[4px] border-white text-xl transform transition hover:scale-105 active:translate-y-2 active:shadow-none w-32 flex flex-col items-center gap-2">
                      <span className="text-3xl">😢</span>
                      <span>HARD</span>
                    </button>
                  </div>
                </div>
              )}

              <div className={`relative mt-12 transition-opacity duration-500 ${!hasStarted ? 'opacity-30 blur-sm pointer-events-none' : 'opacity-100'}`}>

                <div className="bg-[#148e9c] px-3 pb-3 pt-[52px] rounded-[20px] border-[6px] border-white shadow-[0_8px_0_rgba(0,0,0,0.1)] relative z-0 mt-[40px] mb-[20px]">
                  <div className="absolute -top-[55px] left-1/2 -translate-x-1/2 z-30 pointer-events-none drop-shadow-md">
                    <img src="assets/cat.png" alt="Cat" className="object-contain w-[280px] max-w-none select-none" draggable={false} />
                  </div>
                  <div className="absolute top-[8px] left-[6px] right-[6px] flex justify-between z-20 pointer-events-none drop-shadow-md">
                    <div className="bg-[#cc2e2e] text-white font-black px-3 py-[4px] rounded-[10px] border-[3px] border-white shadow-[0_3px_0_rgba(0,0,0,0.15)] text-[14px] tracking-wider min-w-[90px] w-auto whitespace-nowrap text-center shadow-[inset_0_2px_4px_rgba(255,255,255,0.4)] relative">
                      LEVEL {level}
                    </div>
                    <div className="bg-[#cc2e2e] text-white font-black px-3 py-[4px] rounded-[10px] border-[3px] border-white shadow-[0_3px_0_rgba(0,0,0,0.15)] text-[14px] tracking-wider min-w-[90px] w-auto whitespace-nowrap text-center shadow-[inset_0_2px_4px_rgba(255,255,255,0.4)] relative">
                      SCORE {score}
                    </div>
                  </div>

                  {combos.map(combo => (
                    <div key={combo.id} className="absolute z-50 pointer-events-none anim-combo text-[28px] font-black text-yellow-300 drop-shadow-md whitespace-nowrap" style={{ left: `${(combo.c * 25) + 12.5}%`, top: `${(combo.r * 25)}%`, textShadow: '2px 2px 0 #e65100, -2px -2px 0 #e65100, 2px -2px 0 #e65100, -2px 2px 0 #e65100' }}>
                      COMBO x{combo.count}!
                    </div>
                  ))}

                  {particles.map(p => (
                    <div key={p.id} className="absolute w-[12px] h-[12px] rounded-full z-40 anim-particle pointer-events-none"
                      style={{ left: `${p.c * 68 + 12 + 24}px`, top: `${p.r * 68 + 12 + 24}px`, backgroundColor: p.color, '--tx': p.tx, '--ty': p.ty }} />
                  ))}

                  <div className="grid grid-cols-4 gap-2">
                    {grid.map((row, rIndex) => row.map((cellValue, cIndex) => {
                      let isHintHighlight = false;
                      if (hintsEnabled && !gameOver && hasStarted && !confirmPrompt && cellValue === null) {
                        const checkTile = selectedItem ? selectedItem.value : queue[0];
                        const neighbors = [[rIndex + 1, cIndex], [rIndex - 1, cIndex], [rIndex, cIndex + 1], [rIndex, cIndex - 1]];
                        for (let [nr, nc] of neighbors) {
                          if (nr >= 0 && nr < 4 && nc >= 0 && nc < 4 && grid[nr][nc] !== null) {
                            let nVal = grid[nr][nc];
                            if (checkTile === nVal || (checkTile > nVal && checkTile % nVal === 0) || (nVal > checkTile && nVal % checkTile === 0)) {
                              isHintHighlight = true;
                              break;
                            }
                          }
                        }
                      }
                      const isAnimating = animatingCells.includes(`${rIndex},${cIndex}`);

                      return (
                        <div key={`${rIndex}-${cIndex}`} data-grid-r={rIndex} data-grid-c={cIndex} onClick={() => handleGridClick(rIndex, cIndex)} className={`w-[60px] h-[60px] bg-[#0c707d] rounded-xl relative overflow-hidden transition-colors duration-300 ${isHintHighlight ? 'border-[3px] border-yellow-400 shadow-[inset_0_0_15px_rgba(250,204,21,0.5)] animate-pulse' : 'shadow-[inset_0_6px_8px_rgba(0,0,0,0.4)] border-2 border-[#095762] drop-shadow-sm'} ${selectedItem && cellValue === null ? 'hover:bg-[#11818f] cursor-pointer ring-2 ring-white/50' : ''}`}>
                          {cellValue !== null && (
                            <div className={`absolute inset-0 top-[-2px] left-[-2px] right-[-2px] bottom-[-2px] origin-center ${isAnimating ? 'anim-combine' : ''}`}>
                              <Tile value={cellValue} isDraggable={false} extraClasses="w-full h-full !rounded-xl !border-0" />
                            </div>
                          )}
                        </div>
                      );
                    }))}
                  </div>
                </div>

                {gameOver && hasStarted && (
                  <div className="absolute inset-0 z-30 flex flex-col items-center justify-center bg-black/70 rounded-[20px] text-white backdrop-blur-sm mt-8">
                    <h2 className="text-4xl font-black mb-2 text-[#ff6b6b] drop-shadow-md tracking-wider">GAME OVER</h2>
                    <p className="text-xl font-bold mb-6">Final Score: {score}</p>
                    <button onClick={() => resetGame()} className="bg-[#00c853] hover:bg-[#00e676] text-white font-black px-8 py-4 rounded-full shadow-[0_4px_0_#009624] border-[3px] border-white transform transition active:translate-y-1 active:shadow-none text-xl">
                      PLAY AGAIN
                    </button>
                  </div>
                )}
                {confirmPrompt && hasStarted && !gameOver && (
                  <div className="absolute inset-0 z-40 flex flex-col items-center justify-center bg-black/70 rounded-[20px] text-white backdrop-blur-sm mt-4 p-4 text-center">
                    <h2 className="text-2xl font-black mb-2 text-[#ffca28] drop-shadow-md tracking-wider">
                      {confirmPrompt.type === 'BACK' ? 'RETURN TO START?' : `CHANGE TO LEVEL ${confirmPrompt.value}?`}
                    </h2>
                    <p className="text-md font-bold mb-6 opacity-90 px-2">Your current game will be lost.</p>
                    <div className="flex gap-4">
                      <button onClick={() => {
                        setConfirmPrompt(null);
                      }} className="bg-[#e53935] hover:bg-[#d32f2f] text-white font-black px-4 py-2 rounded-xl shadow-[0_4px_0_#b71c1c] border-[3px] border-white transform transition active:translate-y-1 active:shadow-none">
                        CANCEL
                      </button>
                      <button onClick={() => {
                        if (confirmPrompt.type === 'BACK') { setHasStarted(false); }
                        else { resetGame(confirmPrompt.value); }
                        setConfirmPrompt(null);
                      }} className="bg-[#4db6ac] hover:bg-[#00897b] text-white font-black px-4 py-2 rounded-xl shadow-[0_4px_0_#00695c] border-[3px] border-white transform transition active:translate-y-1 active:shadow-none">
                        YES
                      </button>
                    </div>
                  </div>
                )}

              </div>

              <div className={`relative flex flex-col items-center w-[110px] bg-[#fcb45b] border-[4px] border-[#e28e2d] rounded-full py-6 shadow-[0_6px_0_rgba(0,0,0,0.1)] transition-opacity duration-500 ${!hasStarted ? 'opacity-30 blur-sm pointer-events-none' : 'opacity-100'}`}>
                <div className="flex flex-col items-center w-full z-0">
                  <div data-keep="true" onClick={handleKeepClick} className={`w-[68px] h-[68px] bg-[#a7ecea] rounded-2xl border-[4px] border-white shadow-inner flex items-center justify-center ${selectedItem && selectedItem.source === 'ACTIVE' ? 'cursor-pointer hover:bg-[#8ee0de]' : ''}`}>
                    {keepVal !== null && (
                      <div style={{ opacity: (dragInfo?.item.source === 'KEEP' && !isSnappingBack) ? 0 : 1 }}>
                        <Tile value={keepVal} isDraggable={true} onPointerDown={(e) => handlePointerDown(e, 'KEEP', keepVal)} extraClasses="scale-[0.9] origin-center" isSelected={selectedItem?.source === 'KEEP'} />
                      </div>
                    )}
                  </div>
                  <span className="text-[#c17a1e] font-black text-[13px] tracking-widest mt-2 uppercase">KEEP</span>
                </div>

                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-[#f8f9fa] p-2 px-3 rounded-[15px] shadow-[0_4px_10px_rgba(0,0,0,0.2)] border-[4px] border-white flex justify-center items-center gap-2 z-20 w-max">
                  <div className="w-[55px] h-[55px] shrink-0" style={{ opacity: (dragInfo?.item.source === 'ACTIVE' && !isSnappingBack) ? 0 : 1 }}>
                    <Tile value={queue[0]} isDraggable={true} onPointerDown={(e) => handlePointerDown(e, 'ACTIVE', queue[0])} isSelected={selectedItem?.source === 'ACTIVE'} extraClasses="w-full h-full !rounded-[10px] !text-[20px]" />
                  </div>
                  <div className="w-[45px] h-[45px] opacity-80 pointer-events-none shrink-0">
                    <Tile value={queue[1]} isDraggable={false} extraClasses="w-full h-full !rounded-[8px] !text-[16px] grayscale relative" />
                  </div>
                  <div className="w-[35px] h-[35px] opacity-60 pointer-events-none shrink-0">
                    <Tile value={queue[2]} isDraggable={false} extraClasses="w-full h-full !rounded-[6px] !text-[14px] grayscale relative" />
                  </div>
                </div>

                <div className="h-[70px]"></div>

                <div className="flex flex-col items-center w-full z-0 mt-4">
                  <span className="text-[#e53935] font-black text-[13px] tracking-widest mb-2 uppercase">TRASH</span>
                  <div data-trash="true" onClick={handleTrashClick} className={`w-[68px] h-[68px] bg-white rounded-2xl border-[4px] border-[#e53935] shadow-inner flex flex-col items-center justify-center transition-colors relative overflow-hidden ${trashAnim ? 'anim-trash-pop z-50' : ''} ${(trashCount > 0 && selectedItem) ? 'bg-red-50 cursor-pointer' : ''}`}>
                    <svg className="w-8 h-8 text-[#e53935] mb-1" viewBox="0 0 24 24" fill="currentColor">
                      <path d="M9 3V4H4V6H5V19C5 20.1 5.9 21 7 21H17C18.1 21 19 20.1 19 19V6H20V4H15V3H9ZM7 6H17V19H7V6ZM9 8V17H15V8H13Z" />
                    </svg>
                    <div className="absolute bottom-0 w-full bg-[#e53935] text-white font-bold text-[11px] text-center py-[2px]">X{trashCount}</div>
                  </div>
                </div>

              </div>
            </div>

            <div className="mt-12 text-[#c2185b] font-bold text-xs flex flex-wrap justify-center gap-4 opacity-70 z-10 px-4 text-center w-full max-w-lg mb-8">
              <span><kbd className="bg-white/50 px-1 rounded">Z</kbd> Undo</span>
              <span><kbd className="bg-white/50 px-1 rounded">R</kbd> Restart</span>
              <span className="hidden sm:inline"><kbd className="bg-white/50 px-1 rounded">1, 2, 3</kbd> Difficulty</span>
              <span><kbd className="bg-white/50 px-1 rounded">G</kbd> Hints</span>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
